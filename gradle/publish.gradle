apply plugin: 'maven-publish'

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release

                groupId = 'com.github.answufeng'
                artifactId = 'aw-db'
                version = project.findProperty('VERSION_NAME') ?: '1.0.0'

                pom {
                    name = 'aw-db'
                    description = 'aw-db - Room database utility library for Android'
                    url = 'https://github.com/answufeng/aw-db'

                    licenses {
                        license {
                            name = 'The Apache License, Version 2.0'
                            url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                        }
                    }

                    developers {
                        developer {
                            id = 'answufeng'
                            name = 'answufeng'
                        }
                    }

                    scm {
                        connection = 'scm:git:https://github.com/answufeng/aw-db.git'
                        url = 'https://github.com/answufeng/aw-db'
                    }
                }
            }
        }
    }
}
